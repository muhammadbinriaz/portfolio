    <link rel="preload" as="style" href="/playground.css" />
    <!-- Critical baseline: keep the screen black before the page CSS is applied
         so we never flash raw/unstyled HTML (fixes the first-visit flicker).
         Page content itself isn't rendered until its stylesheet is ready (see
         usePageCss + App), so only this black backdrop shows during the wait. -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
      }
    </style>
